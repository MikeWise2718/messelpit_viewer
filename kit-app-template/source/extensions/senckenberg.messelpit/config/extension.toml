[package]
title = "Messel Pit"
version = "0.1.0"
description = "Domain logic for the Senckenberg Messel Pit viewer: auto-load, viewpoints, info panel. Shared by the desktop (Explorer) and streaming (Viewer) kit apps."
category = "Other"
keywords = ["messelpit", "senckenberg", "lidar", "heightfield", "vr"]
authors = ["Senckenberg Naturmuseum Frankfurt"]

[dependencies]
"omni.kit.uiapp" = {}
"omni.usd" = {}
"omni.ui" = {}
# omni.kit.viewport.utility is required for the viewpoint camera moves but is
# already pulled in by both setup extensions; declaring it here is optional —
# left out to keep our deps minimal and let the host .kit decide. If we ever
# build a "vanilla Kit" smoke test that doesn't load a setup, add it back.

# Optional XR deps. These are present in the viewer_xr.kit (via
# omni.kit.xr.bundle.generic + omni.kit.scene_view.xr_utils that ships with
# the XR ui.stage extension) and absent in the desktop kit. Marked optional
# so the extension still loads in the desktop kit; ui_vr.py imports them
# lazily so a missing module fails the panel build but not the extension.
"omni.kit.xr.core" = { optional = true }
"omni.kit.scene_view.xr" = { optional = true }
"omni.kit.scene_view.xr_utils" = { optional = true }

[[python.module]]
name = "senckenberg.messelpit"

[settings.app]
# Path to the messel.usd to auto-open on startup. Override at launch via:
#   --/app/messelpit/load_usd=D:\path\to\messel.usd
# If empty (default), no auto-load; the app opens an empty stage.
messelpit.load_usd = ""

# Whether the docked controls panel is visible by default.
messelpit.ui.show_panel = true

[settings]
# Register this extension's xrmanifests folder so Kit picks up our custom
# action map (xrmanifests/action_maps/messelpit_vr_oculus_touch.json).
# Mirrors omni.kit.xr.core's own pattern:
#   xr.manifests."omni.kit.xr.core" = "xrmanifests"
# Our manifest has priority 100 (vs. stock 30), so when a Touch/Touch Plus
# controller binds, Kit picks ours over the stock vr_right_oculus_touch.
# The manifest declares messelpit_menu in its "tools" list, which causes
# Kit to call MesselpitMenuTool.on_enable() on session start.
xr.manifests."senckenberg.messelpit" = "xrmanifests"
